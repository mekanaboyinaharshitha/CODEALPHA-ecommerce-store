<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0b1220);
}

/* HEADER */
.header{
    text-align:center;
    padding:25px;
    font-size:26px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

/* WRAPPER */
.wrapper{
    display:flex;
    gap:20px;
    padding:20px;
    max-width:1100px;
    margin:auto;
}

/* ITEMS */
.items{
    flex:2;
}

/* SUMMARY */
.summary{
    flex:1;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:20px;
    border-radius:16px;
    position:sticky;
    top:20px;
}

/* ITEM */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.06);
    padding:15px;
    margin-bottom:12px;
    border-radius:14px;
}

/* BUTTONS */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

.remove{background:#ef4444;color:white;}
.buy{background:#22c55e;color:white;}
.clear{background:#f59e0b;color:white;}

.price{color:#22c55e;font-weight:bold;}

.empty{text-align:center;opacity:0.7;}
</style>
</head>

<body>

<div class="header">🛒 Your Cart</div>

<div class="wrapper">

<div class="items" id="items"></div>

<div class="summary">
<h2>Order Summary</h2>
<p id="count">Items: 0</p>
<h3 id="total">Total: ₹0</h3>

<button class="buy" onclick="placeOrder()">Place Order</button>
<button class="clear" onclick="clearCart()">Clear Cart</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render() {
    let items = document.getElementById("items");

    if (cart.length === 0) {
        items.innerHTML = "<div class='empty'>Cart Empty 🛒</div>";
        document.getElementById("count").innerText = "Items: 0";
        document.getElementById("total").innerText = "Total: ₹0";
        return;
    }

    let total = 0;

    items.innerHTML = cart.map((c, i) => {
        total += c.price;

        return `
        <div class="item">
            <div>
                <h3>${c.name}</h3>
                <div class="price">₹${c.price}</div>
            </div>
            <button class="remove" onclick="removeItem(${i})">Remove</button>
        </div>
        `;
    }).join("");

    document.getElementById("count").innerText = "Items: " + cart.length;
    document.getElementById("total").innerText = "Total: ₹" + total;
}

/* =========================
   REMOVE ITEM
========================= */
function removeItem(i) {
    cart.splice(i, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
}

/* =========================
   CLEAR CART
========================= */
function clearCart() {
    cart = [];
    localStorage.removeItem("cart");
    render();
}

/* =========================
   PLACE ORDER (BACKEND CONNECTED)
========================= */
function placeOrder() {

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    let total = cart.reduce((sum, item) => sum + item.price, 0);

    fetch("/api/order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            items: cart,
            total: total
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("🎉 Order Placed Successfully!");

        cart = [];
        localStorage.removeItem("cart");
        render();
    })
    .catch(err => {
        alert("Error placing order!");
        console.log(err);
    });
}

render();</script>

</body>
</html>
