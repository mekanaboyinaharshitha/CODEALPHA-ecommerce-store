<!DOCTYPE html>
<html>
<head>
<title>CodeAlpha Store</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0b1220);
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    padding:18px 40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    position:sticky;
    top:0;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:#38bdf8;
}

.cart{
    background:#ef4444;
    padding:8px 14px;
    border-radius:20px;
    text-decoration:none;
    color:white;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    opacity:0.8;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    padding:30px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    overflow:hidden;
    transition:0.3s;
    backdrop-filter:blur(10px);
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.price{
    color:#22c55e;
    font-weight:bold;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">📚 CodeAlpha Book Store</div>
    <a class="cart" href="cart.html">🛒 Cart</a>
</div>

<div class="hero">
    <h1>Welcome to CodeAlpha Store 🚀</h1>
    <p>Learn Programming with Premium Books</p>
</div>

<div class="grid" id="grid"></div>

<script>
const books = [
{
    name: "Java Mastery",
    price: 299,
    img: "https://images.unsplash.com/photo-1519682337058-a94d519337bc"
},
{
    name: "Python Guide",
    price: 399,
    img: "https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5"
},
{
    name: "Web Development",
    price: 499,
    img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085"
},
{
    name: "DSA Complete",
    price: 599,
    img: "https://images.unsplash.com/photo-1555066931-4365d14bab8c"
}
];

/* =========================
   LOAD PRODUCTS
========================= */
function load() {
    document.getElementById("grid").innerHTML =
        books.map((b, i) => `
        <div class="card">
            <img src="${b.img}">
            <div class="card-body">
                <h3>${b.name}</h3>
                <div class="price">₹${b.price}</div>
                <button onclick="addToCart(${i})">Add to Cart</button>
            </div>
        </div>
        `).join("");
}

/* =========================
   ADD TO CART (CLEAN VERSION)
========================= */
function addToCart(index) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let book = books[index];

    cart.push({
        name: book.name,
        price: book.price
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("🛒 Added to Cart!");
}

load();
</script>

</body>
</html>
